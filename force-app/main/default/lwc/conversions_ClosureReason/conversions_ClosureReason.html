<template>
	<lightning-card>
		<template if:true={showSpinner}>
			<lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
		</template>
		<template if:false={disableReason}>
			<div class="slds-notify slds-notify_alert slds-theme_alert-texture slds-theme_warning" role="alert">
				<span class="slds-assistive-text">Warning</span>
				<span class="slds-icon_container slds-icon-utility-warning slds-m-right_small" title="warning">
					<lightning-icon icon-name="utility:warning" alternative-text="warning" size="small"></lightning-icon>
				</span>
				<h2>Ensure that the “Case Closure Reason” is updated when closing the case.</h2>
			</div>
		</template>
		<lightning-record-edit-form record-id={conversionId} object-api-name="Conversion__c" onsuccess={handleSuccess}  onsubmit={handleSubmit}>
			<div class="slds-grid slds-gutters slds-align_absolute-center">
				<div class="slds-col slds-size_4-of-5">
					<template if:true={disableReason}>
						<lightning-input-field 
                                field-name="Case_Closure_Reason__c"
                                variant="label-hidden"
                                class="read-only"
                                disabled></lightning-input-field>
					</template>
					<template if:false={disableReason}>
						<lightning-input-field 
                                field-name="Case_Closure_Reason__c"
                                onchange={handleReasonChange}></lightning-input-field>
					</template>
				</div>
				<div class="slds-col slds-size_1-of-5 slds-p-left_small slds-grid slds-grid_align-center">
					<lightning-button
                            type="submit"
                            variant="brand"
                            disabled={disableSubmit}
                            label="Submit"></lightning-button>
				</div>
			</div>
		</lightning-record-edit-form>
	</lightning-card>
</template>
