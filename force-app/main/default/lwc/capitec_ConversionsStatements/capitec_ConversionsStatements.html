<template>
    <lightning-card>

        <div class="slds-grid slds-wrap slds-p-bottom_medium">
            <div class="slds-col slds-size_3-of-12"> 
                <b> Select Transactions</b>
            </div>
            <div class="slds-col slds-size_3-of-12"></div>
            <div class="slds-col slds-size_3-of-12 slds-p-right_x-small">
                <lightning-input type="date" label="From Date" value={fromDate} onchange={handleFromDateChange}></lightning-input>
            </div>
        </div>

        <div class="slds-p-horizontal_medium">
            <div class="slds-grid slds-wrap slds-p-bottom_small slds-p-top_small" style="background-color: lightgrey;">
                <div class="slds-col slds-size_7-of-12 slds-p-left_small">
                    <lightning-icon icon-name="standard:account" size="medium" class="slds-m-right_small"></lightning-icon>
                    <strong>Bank 1 Statement Name</strong><br/>
                    <span>Account Number: 12345678</span>
                </div>

                <div class="slds-col slds-size_5-of-12 slds-p-right_small">
                    <lightning-input type="search" placeholder="Search debit orders" onchange={handleSearch}></lightning-input>
                </div>
            </div>

            <lightning-datatable
                    key-field="Id"
                    data={filteredRecords}
                    columns={columns}
                    onrowselection={handleRowSelection}
                    selected-rows={selectedRowIds}>  
            </lightning-datatable>
        </div>

        <div class="slds-p-horizontal_medium slds-p-top_small">
            <lightning-input type="checkbox" label="Debit order initiator not listed" checked={notListed} onchange={handleNotListedToggle}></lightning-input>
        </div>

        <div class="slds-p-horizontal_medium slds-p-vertical_medium">
            <lightning-button
                    label="Submit"
                    variant="brand"
                    onclick={handleSubmit}
                    disabled={isSubmitDisabled}>
            </lightning-button>
        </div>
    </lightning-card>

     <c-capitec-_-conversions-switch-modal
        is-open={showModal}
        debit-orders={selectedRows}
        onclosemodal={handleModalClose}>
    </c-capitec-_-conversions-switch-modal>

</template>
