<template>
    <div class="slds-p-around_medium">

        <h2 class="slds-text-heading_medium slds-m-bottom_small">
            Return Case to Awaiting DOI Confirmation
        </h2>

        <template if:true={isLoading}>
            <lightning-spinner alternative-text="Loading case info" size="medium"></lightning-spinner>
        </template>

        <template if:false={isLoading}>
            <template if:true={alreadyInQueue}>
                <div class="slds-box slds-theme_info">
                    <p>
                        This case is already assigned to the
                        <strong>Awaiting DOI Confirmation</strong> queue.
                        No further action is required.
                    </p>
                </div>
            </template>

            <template if:false={alreadyInQueue}>
                <p class="slds-m-bottom_medium">
                    Are you sure you want to move this case back to Awaiting DOI Confirmation? </br>
                    Please verify your changes before proceeding.
                </p>
            </template>

            <div class="slds-m-top_medium slds-text-align_right">
                <lightning-button
                    variant="neutral"
                    label="Cancel"
                    onclick={handleCancel}>
                </lightning-button>

                <lightning-button
                    class="slds-m-left_small"
                    variant="brand"
                    label="Submit"
                    onclick={handleSubmit}
                    disabled={isLoading}>
                </lightning-button>
            </div>
        </template>

    </div>
</template>
