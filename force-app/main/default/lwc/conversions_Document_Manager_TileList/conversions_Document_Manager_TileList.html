<template>
    <template if:true={hasItems}>
        <div style="display:flex; flex-direction:column; gap:16px; padding:8px;">
            <template if:true={isLoading}>
                <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
            </template>
            <template for:each={requestListItems} for:item="file">

                <div key={file.Id} style="border:1px solid #d8dde6;border-radius:6px;padding:16px;background:white;">

                    <div style="display:flex; justify-content:space-between; gap:24px;">
                        <div style="display:flex; flex-direction:column;">
                            <div style="font-size:13px; color:#444; margin-bottom:4px;font-weight:700;">
                                Document:
                            </div>

                            <div style="font-size:13px;margin-bottom:4px;">
                                {file.DocumentName__c}
                            </div>
                        </div>

                        <div style="display:flex; flex-direction:column;">
                            <div style="font-size:13px; color:#444; margin-bottom:4px;">
                                Document Type
                            </div>

                            <div style="display:flex; align-items:center; gap:4px;">
                                <lightning-combobox name="docType"
                                                    data-id={file.Id} 
                                                    placeholder="Select Option"
                                                    options={documentTypeOptions}
                                                    onchange={handleDocTypeChange}
                                                    style="min-width:255px; height:55px;margin-right: 10px;"
                                                    required>
                                </lightning-combobox>

                                <template if:true={showOtherField}>
                                    <div style="display:flex; align-items:flex-end; gap:10px; margin-top:-9px;">

                                        <lightning-input label="Enter Doctype - Mandatory"
                                                         class="otherInput"
                                                         style="margin-right:5px;"
                                                         data-rowid={file.Id}
                                                         required>
                                        </lightning-input>

                                        <lightning-button variant="brand"
                                                          style="margin-bottom: 3px;"
                                                          label="Classify"
                                                          data-rowid={file.Id}
                                                          onclick={handleClassify}>
                                        </lightning-button>

                                    </div>                                   
                                </template>
                            </div>
                        </div>
                    </div>
                </div>

            </template>
        </div>
    </template>

    <template if:false={hasItems}>
        <div class="slds-p-bottom_small">
            <div class="slds-box slds-theme--shade">
                <p><lightning-icon icon-name="utility:info" alternative-text="Info" size="x-small"></lightning-icon>
                &nbsp;There are no documents that require classification</p>
            </div>
        </div>
    </template>
</template>
