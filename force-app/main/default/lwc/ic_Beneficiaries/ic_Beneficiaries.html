<template> 

  <article class="slds-card slds-card_boundary">
    <div class="slds-page-header">
      <div class="slds-page-header__row">
        <div class="slds-page-header__col-title">
          <div class="slds-media">
            <div class="slds-media__figure">
              <span class="slds-icon_container slds-icon-standard-opportunity">            
                <lightning-icon icon-name="standard:queue" size="medium"></lightning-icon>
              </span>
            </div>
            <div class="slds-media__body">
              <div class="slds-page-header__name">
                <div class="slds-page-header__name-title">
                  <h1>
                    <span class="slds-page-header__title slds-truncate" title="Beneficiaries">Beneficiaries ({otherLifeSize})</span>
                    <span>{otherLifeSize} items</span>
                  </h1>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <lightning-datatable
            key-field="Id"
            data={otherLifeData}
            columns={columns}
            hide-checkbox-column
            errors={errorx}>
    </lightning-datatable>
  </article>

  
  <article class="slds-card slds-card_boundary">
    <div class="slds-page-header">
      <div class="slds-page-header__row">
        <div class="slds-page-header__col-title">
          <div class="slds-media">
            <div class="slds-media__figure">
              <span class="slds-icon_container slds-icon-standard-opportunity">            
                <lightning-icon icon-name="standard:employee" size="medium"></lightning-icon>
              </span>
            </div>
            <div class="slds-media__body">
              <div class="slds-page-header__name">
                <div class="slds-page-header__name-title">
                  <h1>
                    <span class="slds-page-header__title slds-truncate" title="Main Life Beneficiaries">Main Life Beneficiaries ({mainLifeSize})</span>
                    <span>{mainLifeSize} items</span>
                  </h1>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <lightning-datatable
            key-field="Id"
            data={mainLifeData}
            columns={columns}
            hide-checkbox-column
            errors={errorx}>
    </lightning-datatable>
  </article>

</template>
