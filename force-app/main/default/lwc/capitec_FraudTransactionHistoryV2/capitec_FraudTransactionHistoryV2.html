        <div class="slds-grid slds-gutters slds-align_absolute-center slds-grid_vertical-align-center slds-m-bottom_x-small" data-id="main-container" style='width:100%'>
            <!-- Label and Last 7 Days Button -->
            <div class="slds-col slds-size_2-of-12">
                <label class="slds-form-element__label" for="last7DaysButton">Select</label>
                <button id="last7DaysButton" class="slds-button slds-button_neutral slds-button_stretch" onclick={getLast7Dates} data-id="flag-button">
                    Last 7 days
                </button>
            </div>

            <!-- Last 30 Days Button -->
            <div class="slds-col slds-size_2-of-12">
                <label class="slds-form-element__label" for="last30DaysButton">Select</label>
                <button id="last30DaysButton" class="slds-button slds-button_neutral slds-button_stretch" onclick={getLast30Dates} data-id="flag-button">
                    Last 30 days
                </button>
            </div>

            <!-- From Date Input -->
            <div class="slds-col slds-size_2-of-12">
                <lightning-input type="date" name="input1" data-id="startDateInput" label="From Date" value={startDate}></lightning-input>
            </div>

            <!-- To Date Input -->
            <div class="slds-col slds-size_2-of-12">
                <lightning-input type="date" name="input2" data-id="endDateInput" label="To Date" value={endDate}></lightning-input>
            </div>

            <!-- Account Number Combobox -->
            <div class="slds-col slds-size_2-of-12">
                <lightning-combobox label="Account Number" value={comboboxValue} options={financialAccountsNumbers} data-id="combobox-fin-id"></lightning-combobox>
            </div>

            <!-- Get Transactions Button -->
            <div class="slds-col slds-size_2-of-12">
                <lightning-combobox label="Account Type" 
                    value={accType} 
                    options={accountTypeOptions} 
                    data-id="accType-fin-id">">
                </lightning-combobox>
            </div>
        </div>

  <div class="slds-page-header slds-m-top_medium slds-p-around_small border-header">
    <div class="slds-page-header__row slds-align_absolute-center">
        <div class="slds-page-header__col-title">
            <div class="slds-media slds-align_absolute-center">
                <!-- Account Icon -->
                <div class="slds-media__figure">
                    <lightning-icon icon-name="standard:account" alternative-text="Account" size="medium"></lightning-icon>
                </div>
                
                <!-- Header and Subheader -->
                <div class="slds-media__body slds-p-left_small">
                    <h1 class="slds-page-header__title slds-truncate" title="Account">
                        Account
                    </h1>
                    <p class="slds-text-body_small slds-page-header__info">Transaction History</p>
                </div>
            </div>
        </div>
        
        <!-- Action Button Section, Center-Aligned Vertically -->
        <div class="slds-page-header__col-actions slds-grid slds-align-center slds-grid_vertical-align-center">
            <!-- Get Transactions Button -->
            <button 
                class="slds-button slds-button_brand slds-m-right_small" 
                onclick={handleGetTransactions} 
                data-id="refresh-button">
                Get Transactions
            </button>

            <!-- Apply Actions Button -->
            <button 
                class="slds-button slds-button_brand red-button" 
                disabled={disableActions} 
                onclick={handleApplyActions} 
                data-id="flag-button">
                Apply Actions
            </button>
        </div>
    </div>
</div>








        <div class="table-container " data-id="table-container">
            <template if:true={itemsToDisplay}>
                <table class="slds-table slds-table_cell-buffer slds-table_bordered table-bordered"> 
                    <thead>
                        <tr class="slds-hint-parent">
                            <th class="slds-text-align_left">Flag</th>
                            <th class="slds-text-align_left">Hold<br/>Inflow</th>
                            <th class="slds-text-align_left">Chase</th>
                            <th class="slds-text-align_left">Account<br/>Number</th>
                            <th class="slds-text-align_left">Transaction<br/>Date</th>
                            <th class="slds-text-align_left">Statement<br/>Description</th>
                            <th class="slds-text-align_left">Amount</th>
                            <th class="slds-text-align_left">Balance</th>
                            <th class="slds-text-align_left">Transaction<br/>Code</th>
                            <th class="slds-text-align_left">Transaction<br/>Description</th>
                            <!--<th class=border-right-custom>Branch<br/>Name</th>-->  <!--Commented as part of FFSF-493-->
                            <!--<th class=border-right-custom>Teller<br/>Name</th>--> <!--Commented as part of FFSF-493-->
                            <th class="slds-text-align_left">Inflow</th>
                            <!--<th class=border-right-custom>Transfer<br/>Account<br/>Number</th>--> <!--Commented as part of FFSF-493-->
                            <!--<th class=border-right-custom>Transfer<br/>Product</th>--> <!--Commented as part of FFSF-493-->
                            <!--<th class=border-right-custom>Channel</th>--> <!--Commented as part of FFSF-493-->
                        </tr>
                    </thead>
                    <tbody>
                    <template for:each={itemsToDisplay} for:item="item" for:index="index" data-id='full-table' >
                        <tr key={item.id} data-id="table-tr">
                            <td class="slds-text-align_left tdformat"><lightning-input type="checkbox" checked={item.flaggedFraud} disabled={item.disableFlag} onchange={handleFlag} data-item-id={index} data-id={index}></lightning-input></td>
                            <td class="slds-text-align_left tdformat"><lightning-input type="checkbox" checked={item.flaggedHold} disabled={item.disableHold} onchange={handleHold} data-item-id={index} data-id={index}></lightning-input></td>
                            <td class="slds-text-align_left tdformat"><lightning-input type="checkbox" checked={item.flaggedChase} disabled={item.disableChase} onchange={handleChase} data-item-id={index} data-id={index}></lightning-input>
                                <template lwc:if={item.showHelpText}>
                                    <lightning-helptext class="help-text" content={item.popUpLabel}>{item.popUpLabel}</lightning-helptext>
                                </template>
                            </td>
                            <td class="slds-text-align_left tdformat">{item.accountNr}</td>
                            <!-- <td class=border-right-custom>{item.transactionDate}</td> -->
                            <td class="slds-text-align_left tdformat">{item.newtransactionDate}</td>
                            <td class="slds-text-align_left tdformat">{item.statementDesc}</td>
                            <td class="slds-text-align_left tdformat">{item.amount}</td>
                            <td class="slds-text-align_left tdformat">{item.balance}</td>
                            <td class="slds-text-align_left tdformat">{item.tranCode}</td>
                            <td class="slds-text-align_left tdformat">{item.originalDesc}</td>
                            <!--<td class=border-right-custom>{item.branch}</td>--> <!--Commented as part of FFSF-493-->
                            <!--<td class=border-right-custom>{item.teller}</td>--> <!--Commented as part of FFSF-493-->
                            <td class="slds-text-align_left tdformat">{item.moneyIn}</td>
                            <!--<td class=border-right-custom>{item.toAccount}</td>--> <!--Commented as part of FFSF-493-->
                            <!--<td class=border-right-custom>{item.transTypeDesc}</td>--> <!--Commented as part of FFSF-493-->
                            <!--<td class=border-right-custom>{item.channel}</td>--> <!--Commented as part of FFSF-493-->
                        </tr>
                    </template>
                    </tbody>
                </table>
            </template>
        </div>
    </div>
</template>
